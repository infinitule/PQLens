name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Ensure OpenSSL >= 3.5 (provides ML-KEM)
        # ubuntu-latest ships OpenSSL 3.x; print it so CI logs prove what the
        # ML-KEM backend bound to. If < 3.5, the smoke tests skip (not fail).
        run: openssl version

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable) with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test (with coverage floor)
        run: pytest -ra --cov=pqlens --cov-report=term-missing --cov-fail-under=88

      - name: CLI self-test + measure
        run: |
          python -m pqlens --backends
          python -m pqlens --selftest || true
          python -m pqlens --measure --algorithms ML-KEM-768,ML-KEM-1024,X-Wing --iterations 5 || true

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install the built wheel in a clean venv and smoke-test it
        run: |
          python -m venv /tmp/clean
          /tmp/clean/bin/python -m pip install dist/*.whl
          /tmp/clean/bin/pqlens --backends
          /tmp/clean/bin/python -c "import pqlens; assert pqlens.__all__"

      - name: Assert data tables shipped in the wheel
        run: |
          python - <<'PY'
          import glob, zipfile
          names = zipfile.ZipFile(glob.glob("dist/*.whl")[0]).namelist()
          for must in ("pqlens/data/algorithms.json", "pqlens/data/compliance.json", "pqlens/py.typed"):
              assert any(n.endswith(must) for n in names), must
          print("wheel contains data tables + py.typed")
          PY
